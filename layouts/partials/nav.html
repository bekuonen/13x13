<header style="background: #2D3640; padding: 1.5rem 0; position: sticky; top: 0; z-index: 1000;">
    <nav style="max-width: 1200px; margin: 0 auto; padding: 0 2rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;">
        <a href="/"><img src="/images/logo.svg" alt="13x13" style="height: 60px;"></a>
        <div style="position:relative;">
            <button onclick="closeAll();var m=document.getElementById('em');m.style.display=m.style.display==='block'?'none':'block';event.stopPropagation();" style="background:transparent;color:white;padding:0.5rem 1rem;font-size:0.85rem;text-transform:uppercase;font-family:'Space Grotesk',sans-serif;border:1px solid rgba(255,255,255,0.3);border-radius:4px;cursor:pointer;">Editorial &#9660;</button>
            <div id="em" onclick="event.stopPropagation();" style="display:none;position:absolute;top:100%;left:0;background:white;min-width:240px;max-height:70vh;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,0.2);border-radius:4px;z-index:10000;">
                <a href="/editorial/" style="display:block;padding:0.75rem 1.2rem;color:#2D3640;text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:0.9rem;border-bottom:1px solid #f0f0f0;" onmouseover="this.style.background='#B8293D';this.style.color='white'" onmouseout="this.style.background='white';this.style.color='#2D3640'">Projekt 13&#215;13</a>
                <a href="/editorial/#idee" style="display:block;padding:0.75rem 1.2rem;color:#2D3640;text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:0.9rem;border-bottom:1px solid #f0f0f0;" onmouseover="this.style.background='#B8293D';this.style.color='white'" onmouseout="this.style.background='white';this.style.color='#2D3640'">Idee &#183; Vision &#183; Werte</a>
                <a href="/editorial/#entstehung" style="display:block;padding:0.75rem 1.2rem;color:#2D3640;text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:0.9rem;border-bottom:1px solid #f0f0f0;" onmouseover="this.style.background='#B8293D';this.style.color='white'" onmouseout="this.style.background='white';this.style.color='#2D3640'">Entstehung</a>
                <a href="/editorial/#wir" style="display:block;padding:0.75rem 1.2rem;color:#2D3640;text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:0.9rem;" onmouseover="this.style.background='#B8293D';this.style.color='white'" onmouseout="this.style.background='white';this.style.color='#2D3640'">Was wir sein wollen</a>
            </div>
        </div>
        <div style="position:relative;">
            <button onclick="closeAll();var m=document.getElementById('km');m.style.display=m.style.display==='block'?'none':'block';event.stopPropagation();" style="background:transparent;color:white;padding:0.5rem 1rem;font-size:0.85rem;text-transform:uppercase;font-family:'Space Grotesk',sans-serif;border:1px solid rgba(255,255,255,0.3);border-radius:4px;cursor:pointer;">Kategorien &#9660;</button>
            <div id="km" onclick="event.stopPropagation();" style="display:none;position:absolute;top:100%;left:0;background:white;min-width:240px;max-height:70vh;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,0.2);border-radius:4px;z-index:10000;">
                {{ range .Site.Menus.main }}
                <a href="{{ .URL }}" style="display:block;padding:0.75rem 1.2rem;color:#2D3640;text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:0.9rem;border-bottom:1px solid #f0f0f0;" onmouseover="this.style.background='#B8293D';this.style.color='white'" onmouseout="this.style.background='white';this.style.color='#2D3640'">{{ .Name }}</a>
                {{ end }}
            </div>
        </div>
        <a href="/authors/" style="color:white;text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:0.85rem;text-transform:uppercase;border:1px solid rgba(255,255,255,0.3);border-radius:4px;padding:0.5rem 1rem;">Autoren</a>
        <a href="/archiv/" style="color:white;text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:0.85rem;text-transform:uppercase;border:1px solid rgba(255,255,255,0.3);border-radius:4px;padding:0.5rem 1rem;">Archiv</a>
        <a href="/kontakt/" style="color:white;text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:0.85rem;text-transform:uppercase;border:1px solid rgba(255,255,255,0.3);border-radius:4px;padding:0.5rem 1rem;">Kontakt</a>
    </nav>
</header>
<script>
function closeAll(){document.getElementById('km').style.display='none';document.getElementById('em').style.display='none';}
document.addEventListener('click',function(){closeAll();});
</script>
