<header style="background:#2D3640;padding:0.9rem 0;position:sticky;top:0;z-index:1000;">
<nav style="max-width:1200px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;">
<a href="/"><img src="/images/logo.svg" alt="13x13" style="height:52px;display:block;"></a>
<button id="nav-toggle" aria-label="Menü" style="display:none;background:transparent;border:1px solid rgba(255,255,255,0.3);border-radius:4px;padding:0.5rem 0.75rem;cursor:pointer;color:white;font-size:1.25rem;line-height:1;">&#9776;</button>
<div id="nav-links" style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
<div style="position:relative;">
<button onclick="closeAll();var m=document.getElementById('em');m.style.display=m.style.display==='block'?'none':'block';event.stopPropagation();" style="background:transparent;color:white;padding:0.45rem 0.9rem;font-size:0.8rem;text-transform:uppercase;font-family:'Space Grotesk',sans-serif;border:1px solid rgba(255,255,255,0.3);border-radius:4px;cursor:pointer;white-space:nowrap;">13 Standpunkte &#9660;</button>
<div id="em" onclick="event.stopPropagation();" style="display:none;position:absolute;top:100%;left:0;background:white;min-width:220px;max-height:70vh;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,0.2);border-radius:4px;z-index:10000;">
<a href="/editorial/" style="display:block;padding:0.7rem 1.1rem;color:#2D3640;text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:0.88rem;border-bottom:1px solid #f0f0f0;" onmouseover="this.style.background='#B8293D';this.style.color='white'" onmouseout="this.style.background='white';this.style.color='#2D3640'">Projekt 13&#215;13</a>
<a href="/editorial/#idee" style="display:block;padding:0.7rem 1.1rem;color:#2D3640;text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:0.88rem;border-bottom:1px solid #f0f0f0;" onmouseover="this.style.background='#B8293D';this.style.color='white'" onmouseout="this.style.background='white';this.style.color='#2D3640'">Idee &#183; Vision &#183; Werte</a>
<a href="/editorial/#entstehung" style="display:block;padding:0.7rem 1.1rem;color:#2D3640;text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:0.88rem;border-bottom:1px solid #f0f0f0;" onmouseover="this.style.background='#B8293D';this.style.color='white'" onmouseout="this.style.background='white';this.style.color='#2D3640'">Entstehung</a>
<a href="/editorial/#wir" style="display:block;padding:0.7rem 1.1rem;color:#2D3640;text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:0.88rem;" onmouseover="this.style.background='#B8293D';this.style.color='white'" onmouseout="this.style.background='white';this.style.color='#2D3640'">Was wir sein wollen</a>
</div>
</div>
<div style="position:relative;">
<button onclick="closeAll();var m=document.getElementById('km');m.style.display=m.style.display==='block'?'none':'block';event.stopPropagation();" style="background:transparent;color:white;padding:0.45rem 0.9rem;font-size:0.8rem;text-transform:uppercase;font-family:'Space Grotesk',sans-serif;border:1px solid rgba(255,255,255,0.3);border-radius:4px;cursor:pointer;white-space:nowrap;">13 Ansichten &#9660;</button>
<div id="km" onclick="event.stopPropagation();" style="display:none;position:absolute;top:100%;left:0;background:white;min-width:220px;max-height:70vh;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,0.2);border-radius:4px;z-index:10000;">
{{ range .Site.Menus.main }}
<a href="{{ .URL }}" style="display:block;padding:0.7rem 1.1rem;color:#2D3640;text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:0.88rem;border-bottom:1px solid #f0f0f0;" onmouseover="this.style.background='#B8293D';this.style.color='white'" onmouseout="this.style.background='white';this.style.color='#2D3640'">{{ .Name }}</a>
{{ end }}
</div>
</div>
<a href="/marktplatz/" style="color:white;text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:0.8rem;text-transform:uppercase;border:1px solid rgba(255,255,255,0.3);border-radius:4px;padding:0.45rem 0.9rem;background:rgba(184,41,61,0.2);white-space:nowrap;">13 Empfehlungen</a>
<a href="/authors/" style="color:white;text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:0.8rem;text-transform:uppercase;border:1px solid rgba(255,255,255,0.3);border-radius:4px;padding:0.45rem 0.9rem;white-space:nowrap;">Schreibende</a>
<a href="/archiv/" style="color:white;text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:0.8rem;text-transform:uppercase;border:1px solid rgba(255,255,255,0.3);border-radius:4px;padding:0.45rem 0.9rem;white-space:nowrap;">Archiv</a>
<a href="/kontakt/" style="color:white;text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:0.8rem;text-transform:uppercase;border:1px solid rgba(255,255,255,0.3);border-radius:4px;padding:0.45rem 0.9rem;white-space:nowrap;">Kontakt</a>
</div>
</nav>
</header>
<style>
@media(max-width:768px){
#nav-toggle{display:block !important;}
#nav-links{display:none !important;position:absolute;top:100%;left:0;right:0;background:#2D3640;flex-direction:column;align-items:stretch;padding:1rem 1.5rem;gap:0.5rem;z-index:999;}
#nav-links.open{display:flex !important;}
#nav-links a,#nav-links button{width:100%;text-align:left;font-size:0.9rem !important;padding:0.6rem 0.9rem !important;}
#nav-links>div{width:100%;}
#em,#km{position:static !important;box-shadow:none !important;border:1px solid #f0f0f0;}
}
</style>
<script>
function closeAll(){document.getElementById('km').style.display='none';document.getElementById('em').style.display='none';}
document.addEventListener('click',function(){closeAll();});
document.getElementById('nav-toggle').addEventListener('click',function(e){
e.stopPropagation();
var links=document.getElementById('nav-links');
links.classList.toggle('open');
});
</script>
