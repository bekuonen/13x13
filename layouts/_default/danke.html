<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danke – 13×13</title>
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css?family=space-grotesk:400,500,600,700|source-serif-4:400,400i,600" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Source Serif 4', serif;
            background: #FAF8F5;
            color: #2D3640;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .danke-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            text-align: center;
        }
        .danke-inner { max-width: 560px; }
        .danke-check {
            width: 64px;
            height: 64px;
            background: #9B1D20;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 1.75rem;
            color: white;
        }
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.05rem;
            color: #6B7280;
            line-height: 1.7;
            margin-bottom: 2rem;
        }
        .back-btn {
            display: inline-block;
            background: #2D3640;
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.75rem 1.75rem;
            border-radius: 4px;
            text-decoration: none;
            transition: background 0.2s;
        }
        .back-btn:hover { background: #9B1D20; }
    </style>
</head>
<body>
{{ partial "nav.html" . }}
<div class="danke-wrap">
    <div class="danke-inner">
        <div class="danke-check">✓</div>
        <h1>Vielen Dank!</h1>
        <p>Ihre Anfrage ist bei uns angekommen. Wir melden uns innerhalb von fünf Werktagen bei Ihnen — für ein kurzes Gespräch und alles Weitere.</p>
        <a href="/" class="back-btn">← Zurück zur Startseite</a>
    </div>
</div>
</body>
</html>
