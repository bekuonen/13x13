backend:
  name: github
  repo: bekuonen/13x13
  branch: main
  base_url: https://cms-auth.bekuonen.workers.dev
media_folder: static/images/uploads
public_folder: /images/uploads
locale: de

collections:
  - name: posts
    label: Artikel
    label_singular: Artikel
    folder: content/posts
    create: tru
    slug: "{{slug}}"
    fields:
      - {label: "Titel", name: "title", widget: "string"}
      - {label: "Datum", name: "date", widget: "datetime", format: "2006-01-02", date_format: "DD.MM.YYYY", time_format: false}
      - {label: "Entwurf", name: "draft", widget: "boolean", default: true}
      - label: "Textformat"
        name: "textformat"
        widget: "select"
        options:
          - {label: "Einschätzung", value: "einschaetzung"}
          - {label: "Reportage", value: "reportage"}
          - {label: "Fiktion", value: "fiktion"}
          - {label: "Beobachtung", value: "beobachtung"}
      - label: "Autoren"
        name: "authors"
        widget: "list"
        field: {label: "Autor", name: "author", widget: "string"}
      - label: "Kategorie"
        name: "categories"
        widget: "select"
        multiple: true
        options:
          - {label: "Genuss", value: "genuss"}
          - {label: "Portraet", value: "portraet"}
          - {label: "Land und Leute", value: "land-leute"}
          - {label: "Sport", value: "sport"}
          - {label: "Politik", value: "politik"}
          - {label: "Kultur", value: "kultur"}
          - {label: "Wirtschaft", value: "wirtschaft"}
          - {label: "Natur", value: "natur"}
          - {label: "Geschichte", value: "geschichte"}
          - {label: "Gesellschaft", value: "gesellschaft"}
          - {label: "Tourismus", value: "tourismus"}
          - {label: "Handwerk", value: "handwerk"}
          - {label: "Bildung", value: "bildung"}
      - {label: "Beschreibung", name: "description", widget: "text", required: false}
      - {label: "Titelbild", name: "featured_image", widget: "image", required: false}
      - {label: "Inhalt", name: "body", widget: "markdown"}

  - name: authors
    label: Autoren
    label_singular: Autor
    folder: content/authors
    create: true
        path: "{{slug}}/_index"
    slug: "{{slug}}"
    fields:
      - {label: "Name", name: "title", widget: "string"}
      - {label: "Biografie", name: "bio", widget: "text", required: false}
      - {label: "E-Mail", name: "email", widget: "string", required: false}
      - {label: "Website", name: "website", widget: "string", required: false}
      - {label: "Foto", name: "photo", widget: "image", required: false}
      - {label: "Ort", name: "ort", widget: "string", required: false}

  - name: pages
    label: Seiten
    files:
      - name: start
        label: Start
        file: content/_index.md
        fields:
          - {label: "Titel", name: "title", widget: "string"}
          - {label: "Beschreibung", name: "description", widget: "text", required: false}
          - {label: "Inhalt", name: "body", widget: "markdown", required: false}
      - name: archiv
        label: Archiv
        file: content/archiv.md
        fields:
          - {label: "Titel", name: "title", widget: "string"}
          - {label: "Inhalt", name: "body", widget: "markdown", required: false}
      - name: editorial
        label: Editorial
        file: content/editorial.md
        fields:
          - {label: "Titel", name: "title", widget: "string"}
          - {label: "Untertitel", name: "subtitle", widget: "string", required: false}
          - {label: "Inhalt", name: "body", widget: "markdown", required: false}
      - name: kontakt
        label: Kontakt
        file: content/kontakt.md
        fields:
          - {label: "Titel", name: "title", widget: "string"}
          - {label: "Redaktion Name", name: "redaktion_name", widget: "string", required: false}
          - {label: "Redaktion E-Mail", name: "redaktion_email", widget: "string", required: false}
          - {label: "Redaktion Telefon", name: "redaktion_telefon", widget: "string", required: false}
          - {label: "Inhalt", name: "body", widget: "markdown", required: false}
      - name: marktplatz
        label: Marktplatz
        file: content/marktplatz.md
        fields:
          - {label: "Titel", name: "title", widget: "string"}
          - {label: "Beschreibung", name: "description", widget: "text", required: false}
          - {label: "Inhalt", name: "body", widget: "markdown", required: false}

  - name: marktplatz
    label: Marktplatz
    label_singular: Empfehlung
    folder: content/marktplatz
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Firmenname", name: "title", widget: "string"}
      - {label: "Folge", name: "folge", widget: "string", hint: "#1, #2, #3 ..."}
      - label: "Kategorie"
        name: "kategorie"
        widget: "select"
        options:
          - {label: "Handwerk & Manufaktur", value: "handwerk-manufaktur"}
          - {label: "Genuss & Gastlichkeit", value: "genuss-gastlichkeit"}
          - {label: "Kultur & Raum", value: "kultur-raum"}
          - {label: "Innovation & Zukunft", value: "innovation-zukunft"}
          - {label: "Tourismus & Erlebnis", value: "tourismus-erlebnis"}
      - {label: "Website", name: "website", widget: "string", required: false}
      - {label: "Logo", name: "logo", widget: "image", required: false}
      - {label: "Kuratierter Text", name: "body", widget: "markdown"}
      - {label: "Foto", name: "foto", widget: "image", required: false}
      - {label: "Schreibende/r", name: "autor", widget: "string", required: false}
      - {label: "Empfehlung der Folge", name: "featured", widget: "boolean", default: false}
